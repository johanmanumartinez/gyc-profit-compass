<!DOCTYPE html>
<html lang="es">
<head>

  <title>Grow Your Clinic — Apps</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    a { display: block; padding: 16px 24px; border: 1px solid rgba(201,168,76,0.3); border-radius: 10px; color: #F4F0E7; text-decoration: none; font-size: 0.92rem; transition: border-color 0.3s, background 0.3s; }
    a:hover { border-color: #C9A84C; background: rgba(201,168,76,0.05); }

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet">

<body>
  <div class="hub">
    <h1>Grow Your Clinic</h1>
